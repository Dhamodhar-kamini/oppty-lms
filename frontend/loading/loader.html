<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oppty TechHub - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="loader.css">
</head>
<body>

    <div class="loader-wrapper">
        
        <div class="book-glow"></div>

        <div class="book-perspective">
            <div class="realistic-book">
                
                <div class="book-cover left-cover"></div>
                <div class="book-page static-left-1"></div>
                <div class="book-page static-left-2"></div>
                
                <div class="book-spine"></div>

                <div class="book-cover right-cover"></div>
                <div class="book-page static-right-1"></div>
                <div class="book-page static-right-2"></div>

                <div class="flip-page" style="--flip-delay: 0s; --z-index: 6;">
                    <div class="page-front"></div>
                    <div class="page-back"></div>
                </div>
                <div class="flip-page" style="--flip-delay: 0.8s; --z-index: 5;">
                    <div class="page-front"></div>
                    <div class="page-back"></div>
                </div>
                <div class="flip-page" style="--flip-delay: 1.6s; --z-index: 4;">
                    <div class="page-front"></div>
                    <div class="page-back"></div>
                </div>

            </div>
        </div>

        <div class="brand-logo-text">
            <img src="../assets/opptylogo.png" alt="Oppty TechHub Logo" class="logo">
        </div>

        <!-- <div class="loading-subtitle">
            Preparing your learning journey
            <span class="animated-dots">
                <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
            </span>
        </div> -->

    </div>

</body>
</html>
